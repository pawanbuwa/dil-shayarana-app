<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dil Shayarana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- matched to dilshayarana.com theme variables ---- */
    --bg:#f1f5f9;
    --outer-bg:#f8fafc;
    --widget-bg:#ffffff;
    --accent:#3b82f6;
    --grad-from:#3b82f6;
    --grad-to:#d946ef;
    --title-color:#0f172a;
    --text-color:#475569;
    --meta-color:#94a3b8;
    --border-color:#e2e8f0;
    --footer-bg:#1e293b;
    --footerbar-bg:#0f172a;
    --radius:8px;
    --shadow:0 1px 2px rgba(15,23,42,.05),0 4px 14px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    color:var(--text-color);
    -webkit-font-smoothing:antialiased;
  }
  .app-shell{display:flex;flex-direction:column;height:100vh;max-width:560px;margin:0 auto;position:relative;background:var(--outer-bg)}

  /* ---------- HEADER ---------- */
  .app-header{
    position:relative;padding:16px 20px 14px;flex-shrink:0;
    background:var(--widget-bg);
    box-shadow:var(--shadow);
    z-index:20;
  }
  .header-glow{
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--grad-from),var(--grad-to));
  }
  .brand{
    font-family:'Noto Serif Devanagari',serif;font-weight:700;
    font-size:24px;letter-spacing:.2px;margin:6px 0 14px;text-align:center;
    color:var(--title-color);position:relative;display:flex;justify-content:center;gap:7px;
  }
  .brand span{
    background:linear-gradient(90deg,var(--grad-from),var(--grad-to));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);
    border:1px solid var(--border-color);border-radius:12px;padding:5px 6px 5px 16px}
  .search-wrap input{
    flex:1;background:transparent;border:none;outline:none;color:var(--title-color);
    font-family:'Montserrat',sans-serif;font-size:14px;padding:9px 0;
  }
  .search-wrap input::placeholder{color:var(--meta-color)}
  .search-wrap button{
    width:38px;height:38px;border-radius:9px;border:none;flex-shrink:0;
    background:linear-gradient(135deg,var(--grad-from),var(--grad-to));color:#fff;
    font-size:15px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .15s ease;
  }
  .search-wrap button:active{transform:scale(.88)}

  /* ---------- FEED ---------- */
  .feed{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
  .feed::-webkit-scrollbar{width:0}

  .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:16px}
  .ink-spinner{
    width:42px;height:42px;border-radius:50%;
    border:3px solid #e2e8f0;border-top-color:var(--accent);
    animation:spin .9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader p{color:var(--meta-color);font-size:13px;letter-spacing:.2px}

  .cards{display:flex;flex-direction:column;gap:14px}

  .shayari-card{
    position:relative;border-radius:var(--radius);padding:20px 18px 16px;
    background:var(--widget-bg);
    box-shadow:var(--shadow);
    animation:cardIn .4s ease both;
    overflow:hidden;
  }
  .shayari-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--grad-from),var(--grad-to));
    opacity:.9;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .category-tag{
    font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--accent);
    background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.18);
    padding:4px 10px;border-radius:20px;text-transform:capitalize;
  }
  .fav-btn{
    background:none;border:none;font-size:19px;color:var(--meta-color);
    cursor:pointer;line-height:1;padding:4px;transition:transform .2s ease,color .2s ease;
  }
  .fav-btn.active{color:#d946ef;transform:scale(1.15)}
  .fav-btn:active{transform:scale(.85)}

  .shayari-text{
    font-family:'Noto Serif Devanagari',serif;font-size:18px;line-height:1.8;
    color:var(--title-color);margin:0 0 18px;white-space:pre-line;
  }

  .card-actions{display:flex;gap:10px}
  .action-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    padding:10px 10px;border-radius:8px;border:1px solid var(--border-color);
    background:var(--bg);color:var(--title-color);
    font-family:'Montserrat',sans-serif;font-size:12.5px;font-weight:500;
    cursor:pointer;transition:transform .15s ease,background .2s ease;
  }
  .action-btn:active{transform:scale(.95)}
  .action-btn.copy-btn:active{background:rgba(59,130,246,.1)}
  .action-btn.share-btn{background:linear-gradient(135deg,#25d366,#1aa851);border-color:transparent;color:#fff;font-weight:600}

  .toast{
    position:fixed;left:50%;bottom:94px;transform:translate(-50%,20px);
    background:var(--title-color);color:#f8fafc;border:1px solid rgba(255,255,255,.08);
    padding:10px 18px;border-radius:10px;font-size:12.5px;opacity:0;
    transition:all .25s ease;pointer-events:none;z-index:80;white-space:nowrap;
    box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}

  .empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:70px 20px;text-align:center;color:var(--meta-color)}
  .empty span{font-size:34px}
  .hidden{display:none !important}

  /* ---------- CATEGORY PANEL ---------- */
  .category-panel{
    position:absolute;inset:0;top:0;z-index:30;padding:20px 16px 100px;overflow-y:auto;
    background:var(--bg);
  }
  .panel-title{font-family:'Noto Serif Devanagari',serif;font-weight:700;font-size:19px;color:var(--title-color);margin:6px 0 16px;text-align:center}
  .category-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .category-chip{
    padding:16px 12px;border-radius:var(--radius);text-align:center;
    background:var(--widget-bg);border:1px solid var(--border-color);box-shadow:var(--shadow);
    color:var(--title-color);font-size:13.5px;font-weight:500;cursor:pointer;
    transition:transform .15s ease,border-color .2s ease;
  }
  .category-chip:active{transform:scale(.94)}
  .category-chip.active{border-color:var(--accent);color:var(--accent)}

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:absolute;left:0;right:0;bottom:0;z-index:40;
    display:flex;justify-content:space-around;align-items:center;
    padding:9px 12px calc(9px + env(safe-area-inset-bottom));
    background:var(--footerbar-bg);
    box-shadow:0 -1px 2px rgba(0,0,0,.15);
  }
  .nav-btn{
    background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:#94a3b8;font-family:'Montserrat',sans-serif;font-size:10.5px;
    padding:6px 18px;border-radius:12px;cursor:pointer;transition:all .2s ease;position:relative;
  }
  .nav-btn .ic{font-size:19px;transition:transform .2s ease}
  .nav-btn.active{color:#f8fafc}
  .nav-btn.active .ic{transform:translateY(-2px)}
  .nav-btn.active::before{
    content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;
    background:linear-gradient(90deg,var(--grad-from),var(--grad-to));
  }
  .nav-btn:active{transform:scale(.92)}
</style>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-glow"></div>
    <h1 class="brand">Dil <span>Shayarana</span></h1>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="शायरी या शब्द खोजें...">
      <button id="searchBtn" aria-label="Search">🔍</button>
    </div>
  </header>

  <main class="feed" id="feed">
    <div class="loader" id="loader">
      <div class="ink-spinner"></div>
      <p>ताज़ा शायरी लाई जा रही है...</p>
    </div>
    <div class="cards" id="cardsContainer"></div>
    <div class="empty hidden" id="emptyState">
      <span>🖋️</span>
      <p>यहाँ कुछ नहीं मिला</p>
    </div>
  </main>

  <section class="category-panel hidden" id="categoryPanel">
    <h2 class="panel-title">श्रेणियाँ चुनें</h2>
    <div class="category-grid" id="categoryGrid"></div>
  </section>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="home">
      <span class="ic">🏠</span>Home
    </button>
    <button class="nav-btn" data-tab="categories">
      <span class="ic">📚</span>Categories
    </button>
    <button class="nav-btn" data-tab="favorites">
      <span class="ic">❤️</span>Favorites
    </button>
  </nav>

</div>

<script>
(function(){
  'use strict';

  /* ================= CONFIG ================= */
  var CONFIG = {
    blogUrl: 'https://www.dilshayarana.com',
    maxResults: 20,
    // Replace with your actual approved Monetag Direct Link (SmartLink) URL
    adLink: 'https://omg10.com/4/11372270',
    storageKey: 'dilShayarana_favorites'
  };

  var els = {
    loader: document.getElementById('loader'),
    cards: document.getElementById('cardsContainer'),
    empty: document.getElementById('emptyState'),
    feed: document.getElementById('feed'),
    searchInput: document.getElementById('searchInput'),
    searchBtn: document.getElementById('searchBtn'),
    categoryPanel: document.getElementById('categoryPanel'),
    categoryGrid: document.getElementById('categoryGrid'),
    toast: document.getElementById('toast'),
    navBtns: document.querySelectorAll('.nav-btn')
  };

  var state = {
    tab: 'home',
    posts: [],
    categories: [],
    activeCategory: null,
    favorites: loadFavorites()
  };

  /* ================= JSONP FEED LOADER ================= */
  var jsonpCounter = 0;
  function jsonpFetch(url){
    return new Promise(function(resolve, reject){
      var cbName = 'dsCallback_' + (jsonpCounter++) + '_' + Date.now();
      var script = document.createElement('script');
      var timeout = setTimeout(function(){
        cleanup();
        reject(new Error('timeout'));
      }, 12000);

      function cleanup(){
        clearTimeout(timeout);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[cbName] = function(data){
        cleanup();
        resolve(data);
      };

      script.onerror = function(){
        cleanup();
        reject(new Error('network'));
      };

      var sep = url.indexOf('?') > -1 ? '&' : '?';
      script.src = url + sep + 'callback=' + cbName;
      document.body.appendChild(script);
    });
  }

  function buildFeedUrl(opts){
    opts = opts || {};
    var path = '/feeds/posts/default';
    if (opts.label) path += '/-/' + encodeURIComponent(opts.label);
    var url = CONFIG.blogUrl + path + '?alt=json-in-script&max-results=' + (opts.max || CONFIG.maxResults);
    if (opts.q) url += '&q=' + encodeURIComponent(opts.q);
    return url;
  }

  /* ================= PARSING HELPERS ================= */
  function stripHtml(html){
    var tmp = document.createElement('div');
    tmp.innerHTML = html || '';
    var text = tmp.textContent || tmp.innerText || '';
    return text.replace(/\s+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
  }

  function parseEntries(feedJson){
    var entries = (feedJson && feedJson.feed && feedJson.feed.entry) || [];
    return entries.map(function(e){
      var id = e.id.$t.split('post-').pop();
      var title = e.title ? e.title.$t : '';
      var contentHtml = e.content ? e.content.$t : (e.summary ? e.summary.$t : '');
      var text = stripHtml(contentHtml);
      var link = '';
      (e.link || []).forEach(function(l){
        if (l.rel === 'alternate') link = l.href;
      });
      var labels = (e.category || []).map(function(c){ return c.term; });
      return {
        id: id,
        title: title,
        text: text || title,
        link: link,
        category: labels[0] || 'Shayari',
        labels: labels,
        published: e.published ? e.published.$t : ''
      };
    });
  }

  /* ================= FAVORITES (localStorage) ================= */
  function loadFavorites(){
    try {
      var raw = localStorage.getItem(CONFIG.storageKey);
      return raw ? JSON.parse(raw) : {};
    } catch(e){ return {}; }
  }
  function saveFavorites(){
    try { localStorage.setItem(CONFIG.storageKey, JSON.stringify(state.favorites)); } catch(e){}
  }
  function toggleFavorite(post){
    if (state.favorites[post.id]) {
      delete state.favorites[post.id];
    } else {
      state.favorites[post.id] = post;
    }
    saveFavorites();
  }

  /* ================= RENDERING ================= */
  function showLoader(show){
    els.loader.classList.toggle('hidden', !show);
  }

  function renderCards(posts){
    els.cards.innerHTML = '';
    if (!posts.length) {
      els.empty.classList.remove('hidden');
      return;
    }
    els.empty.classList.add('hidden');
    var frag = document.createDocumentFragment();
    posts.forEach(function(post){
      frag.appendChild(buildCard(post));
    });
    els.cards.appendChild(frag);
  }

  function buildCard(post){
    var card = document.createElement('article');
    card.className = 'shayari-card';

    var top = document.createElement('div');
    top.className = 'card-top';

    var tag = document.createElement('span');
    tag.className = 'category-tag';
    tag.textContent = post.category;

    var favBtn = document.createElement('button');
    favBtn.className = 'fav-btn' + (state.favorites[post.id] ? ' active' : '');
    favBtn.textContent = state.favorites[post.id] ? '♥' : '♡';
    favBtn.addEventListener('click', function(){
      toggleFavorite(post);
      favBtn.classList.toggle('active');
      favBtn.textContent = state.favorites[post.id] ? '♥' : '♡';
      if (state.tab === 'favorites' && !state.favorites[post.id]) {
        card.remove();
        if (!els.cards.children.length) els.empty.classList.remove('hidden');
      }
    });

    top.appendChild(tag);
    top.appendChild(favBtn);

    var textEl = document.createElement('p');
    textEl.className = 'shayari-text';
    textEl.textContent = post.text;

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var copyBtn = document.createElement('button');
    copyBtn.className = 'action-btn copy-btn';
    copyBtn.innerHTML = '📋 कॉपी करें';
    copyBtn.addEventListener('click', function(){
      copyShayari(post.text);
    });

    var shareBtn = document.createElement('button');
    shareBtn.className = 'action-btn share-btn';
    shareBtn.innerHTML = '💬 शेयर करें';
    shareBtn.addEventListener('click', function(){
      shareOnWhatsapp(post.text, post.link);
    });

    actions.appendChild(copyBtn);
    actions.appendChild(shareBtn);

    card.appendChild(top);
    card.appendChild(textEl);
    card.appendChild(actions);
    return card;
  }

  /* ================= TOAST ================= */
  var toastTimer;
  function showToast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ els.toast.classList.remove('show'); }, 1800);
  }

  /* ================= MONETIZATION TRIGGER ================= */
  // Opens the SmartLink in a background/new tab. On native Android WebView,
  // hook this up via WebChromeClient.onCreateWindow (see notes at bottom).
  function triggerAd(){
    try {
      window.open(CONFIG.adLink, '_blank');
    } catch(e){}
  }

  /* ================= ACTIONS ================= */
  function copyShayari(text){
    function done(ok){
      showToast(ok ? 'शायरी कॉपी हो गई ✓' : 'कॉपी नहीं हो पाई');
      triggerAd();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ done(true); }, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb){
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      cb(ok);
    } catch(e){ cb(false); }
  }

  function shareOnWhatsapp(text, link){
    var msg = text + (link ? ('\n\n' + link) : '') + '\n\n- Dil Shayarana';
    var waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
    window.open(waUrl, '_blank');
    triggerAd();
  }

  /* ================= DATA LOADING ================= */
  function loadPosts(opts){
    opts = opts || {};
    showLoader(true);
    els.cards.innerHTML = '';
    els.empty.classList.add('hidden');

    jsonpFetch(buildFeedUrl(opts)).then(function(data){
      var posts = parseEntries(data);
      state.posts = posts;
      collectCategories(posts);
      renderCards(posts);
      showLoader(false);
    }).catch(function(){
      showLoader(false);
      els.empty.classList.remove('hidden');
      els.empty.querySelector('p').textContent = 'लोड नहीं हो सका, फिर से कोशिश करें';
      showToast('कनेक्शन में समस्या');
    });
  }

  function collectCategories(posts){
    var set = {};
    posts.forEach(function(p){
      (p.labels || []).forEach(function(l){ set[l] = true; });
    });
    var merged = Object.keys(set);
    merged.forEach(function(c){
      if (state.categories.indexOf(c) === -1) state.categories.push(c);
    });
    renderCategoryGrid();
  }

  function renderCategoryGrid(){
    els.categoryGrid.innerHTML = '';
    if (!state.categories.length) return;
    state.categories.forEach(function(cat){
      var chip = document.createElement('div');
      chip.className = 'category-chip' + (state.activeCategory === cat ? ' active' : '');
      chip.textContent = cat;
      chip.addEventListener('click', function(){
        state.activeCategory = cat;
        switchTab('home');
        loadPosts({ label: cat });
      });
      els.categoryGrid.appendChild(chip);
    });
  }

  function loadFavoritesTab(){
    showLoader(false);
    var favList = Object.keys(state.favorites).map(function(id){ return state.favorites[id]; });
    renderCards(favList.reverse());
    if (!favList.length) {
      els.empty.querySelector('p').textContent = 'अभी कोई पसंदीदा शायरी नहीं';
      els.empty.classList.remove('hidden');
    }
  }

  /* ================= TABS / NAV ================= */
  function switchTab(tab){
    state.tab = tab;
    els.navBtns.forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    els.categoryPanel.classList.toggle('hidden', tab !== 'categories');
    els.feed.classList.toggle('hidden', tab === 'categories');

    if (tab === 'home') {
      state.activeCategory = null;
      loadPosts({});
    } else if (tab === 'favorites') {
      loadFavoritesTab();
    } else if (tab === 'categories') {
      renderCategoryGrid();
    }
  }

  els.navBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      if (btn.dataset.tab === 'home' && state.tab === 'home') {
        loadPosts({}); // tap Home again = refresh
        return;
      }
      switchTab(btn.dataset.tab);
    });
  });

  /* ================= SEARCH ================= */
  function runSearch(){
    var q = els.searchInput.value.trim();
    switchTabSilent('home');
    if (!q) { loadPosts({}); return; }
    loadPosts({ q: q });
  }
  function switchTabSilent(tab){
    state.tab = tab;
    els.navBtns.forEach(function(btn){ btn.classList.toggle('active', btn.dataset.tab === tab); });
    els.categoryPanel.classList.add('hidden');
    els.feed.classList.remove('hidden');
  }
  els.searchBtn.addEventListener('click', runSearch);
  els.searchInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') runSearch();
  });

  /* ================= INIT ================= */
  var initialized = false;
  function init(){
    if (initialized) return;
    initialized = true;
    loadPosts({});
  }
  document.addEventListener('DOMContentLoaded', init);
  if (document.readyState !== 'loading') init();

})();
</script>
</body>
</html>
